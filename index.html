<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Punch Card</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a2e;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    min-height: 100dvh;
    font-family: sans-serif;
    padding: 16px;
  }
  .card-wrapper { width: 100%; max-width: 500px; }
  .card { position: relative; width: 100%; border-radius: 16px; overflow: hidden; box-shadow: 0 8px 32px rgba(0,0,0,0.5); }
  .card img.bg { width: 100%; display: block; }
  .holes {
    position: absolute;
    bottom: 7%;
    left: 6%;
    right: 4%;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .hole {
    position: relative;
    width: 14%;
    aspect-ratio: 1;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    border-radius: 50%;
  }
  .hole img.stamp {
    position: absolute;
    inset: -15%;
    width: 130%;
    height: 130%;
    object-fit: contain;
    opacity: 0;
    transform: scale(0.5) rotate(-15deg);
    transition: opacity 0.2s ease, transform 0.2s ease;
    pointer-events: none;
  }
  .hole.punched img.stamp {
    opacity: 1;
    transform: scale(1) rotate(0deg);
  }
  .reset-btn {
    display: block;
    margin: 18px auto 0;
    padding: 10px 28px;
    background: rgba(255,255,255,0.15);
    color: white;
    border: 1px solid rgba(255,255,255,0.3);
    border-radius: 20px;
    font-size: 14px;
    cursor: pointer;
    letter-spacing: 0.5px;
  }
</style>
</head>
<body>
<div class="card-wrapper">
  <div class="card">
    <img class="bg" src="background.png" alt="Punch Card">
    <div class="holes">
      <div class="hole" id="h0"><img class="stamp" src="bottle.png" alt="punched"></div>
      <div class="hole" id="h1"><img class="stamp" src="bottle.png" alt="punched"></div>
      <div class="hole" id="h2"><img class="stamp" src="bottle.png" alt="punched"></div>
      <div class="hole" id="h3"><img class="stamp" src="bottle.png" alt="punched"></div>
      <div class="hole" id="h4"><img class="stamp" src="bottle.png" alt="punched"></div>
      <div class="hole" id="h5"><img class="stamp" src="bottle.png" alt="punched"></div>
    </div>
  </div>
  <button class="reset-btn" onclick="resetAll()">Reset Card</button>
</div>
<script>
  const KEY = 'punchcard_state';
  function loadState() {
    try { return JSON.parse(localStorage.getItem(KEY)) || [false,false,false,false,false,false]; }
    catch(e) { return [false,false,false,false,false,false]; }
  }
  function saveState(s) { try { localStorage.setItem(KEY, JSON.stringify(s)); } catch(e) {} }
  function applyState(s) {
    s.forEach((punched, i) => {
      document.getElementById('h'+i).classList.toggle('punched', punched);
    });
  }
  function resetAll() { const s=[false,false,false,false,false,false]; saveState(s); applyState(s); }
  const state = loadState();
  applyState(state);
  for (let i=0;i<6;i++) {
    document.getElementById('h'+i).addEventListener('click', function() {
      state[i] = !state[i];
      saveState(state);
      applyState(state);
    });
  }
</script>
</body>
</html>
